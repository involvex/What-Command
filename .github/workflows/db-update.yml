name: Update Command DB

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run db:update
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update command db"
          file_pattern: data/commands.db
